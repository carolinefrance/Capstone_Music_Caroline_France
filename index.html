<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Matchmaker | The Rolling Stones</title>
<style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f4f9; color: #333; max-width: 800px; margin: 20px auto; padding: 20px; line-height: 1.4; }
        
        h1 { color: #1DB954; margin-bottom: 10px; margin-top: 0; }
        
        p { margin-top: 0; margin-bottom: 15px; font-size: 15px; }
        h3, h4 { margin-top: 15px; margin-bottom: 10px; }
        
        .controls { display: flex; gap: 10px; margin-bottom: 15px; }
        input[type="text"] { flex-grow: 1; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 15px; }
        button { padding: 10px 20px; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        
        #btn-recommend { background-color: #1DB954; color: white; }
        #btn-recommend:hover { background-color: #1ed760; }
        #btn-stop { background-color: #e0e0e0; color: #333; }
        #btn-stop:hover { background-color: #ccc; }
        
        #results-container { background: white; padding: 15px 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); min-height: 150px; }
        
        .track-item { padding: 6px 0; border-bottom: 1px solid #eee; font-size: 14px; }
        .track-item:last-child { border-bottom: none; }
        
        .match-score { font-weight: bold; color: #1DB954; float: right; }
        .error { color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>
    <h1><span style="color: #000000;">Sonic Matchmaker</span> <span style="color: #b8b8b8;">|</span> The Rolling Stones</span></h1>
    <p>Enter a Rolling Stones track, and our recommendation engine will find the closest matches from the Spotify catalog.</p>

    <div class="controls">
        <input type="text" id="track-input" placeholder="e.g., Paint It, Black" autocomplete="off">
        <button id="btn-recommend">Recommend</button>
        <button id="btn-stop">Stop / Reset</button>
    </div>

    <div id="results-container">
        <div id="output"><em>Awaiting your input...</em></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
